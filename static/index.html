<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shield — Fake URL Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #050a0f;
            --surface: #0b1520;
            --border: #0d2a3d;
            --accent: #00e5ff;
            --accent2: #39ff14;
            --safe: #39ff14;
            --suspicious: #ffcc00;
            --likely: #ff7700;
            --dangerous: #ff1744;
            --text: #c8e6f5;
            --muted: #4a7a99;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Rajdhani', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 820px;
            margin: 0 auto;
            padding: 48px 20px 80px;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .shield-icon {
            width: 52px;
            height: 52px;
            filter: drop-shadow(0 0 12px var(--accent));
        }

        h1 {
            font-family: var(--sans);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #fff;
            line-height: 1;
        }

        h1 span {
            color: var(--accent);
        }

        .tagline {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.2em;
            margin-top: 8px;
        }

        /* ── Input card ── */
        .input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            margin-bottom: 28px;
        }

        .input-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .input-label {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: #071018;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--accent);
            font-family: var(--mono);
            font-size: 0.95rem;
            padding: 14px 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]::placeholder {
            color: #1e3f55;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.1), inset 0 0 20px rgba(0, 229, 255, 0.03);
        }

        button.scan-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 3px;
            font-family: var(--sans);
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 14px 28px;
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
            white-space: nowrap;
        }

        button.scan-btn:hover {
            background: #33eeff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        button.scan-btn:active {
            transform: scale(0.97);
        }

        button.scan-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Spinner ── */
        .spinner {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.15em;
        }

        .spinner.active {
            display: flex;
        }

        .dot-loader span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 0.9s infinite ease-in-out;
        }

        .dot-loader span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dot-loader span:nth-child(3) {
            animation-delay: 0.30s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── Result card ── */
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            display: none;
            animation: fadeUp 0.35s ease;
        }

        .result-card.show {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* verdict banner */
        .verdict-banner {
            padding: 24px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--border);
        }

        .verdict-left {
            flex: 1;
            min-width: 0;
        }

        .verdict-label {
            font-family: var(--mono);
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .verdict-text {
            font-family: var(--sans);
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .verdict-url {
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 4px;
            word-break: break-all;
        }

        /* gauge */
        .gauge-wrap {
            text-align: center;
            flex-shrink: 0;
        }

        .gauge-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid;
            position: relative;
        }

        .gauge-score {
            font-family: var(--mono);
            font-size: 1.6rem;
            font-weight: bold;
            line-height: 1;
        }

        .gauge-sublabel {
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-top: 2px;
        }

        /* color themes */
        .color-safe {
            --vc: var(--safe);
        }

        .color-suspicious {
            --vc: var(--suspicious);
        }

        .color-likely_fake {
            --vc: var(--likely);
        }

        .color-dangerous {
            --vc: var(--dangerous);
        }

        .verdict-banner[data-color] .verdict-text,
        .verdict-banner[data-color] .gauge-score {
            color: var(--vc);
        }

        .verdict-banner[data-color] .gauge-circle {
            border-color: var(--vc);
            box-shadow: 0 0 18px rgba(0, 0, 0, 0.4), inset 0 0 12px rgba(0, 0, 0, 0.3);
        }

        /* stats row */
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            border-bottom: 1px solid var(--border);
        }

        .stat-box {
            flex: 1;
            min-width: 120px;
            padding: 16px 20px;
            border-right: 1px solid var(--border);
            text-align: center;
        }

        .stat-box:last-child {
            border-right: none;
        }

        .stat-val {
            font-family: var(--mono);
            font-size: 1.1rem;
            color: var(--accent);
            display: block;
        }

        .stat-name {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        /* signals */
        .signals-section {
            padding: 20px 28px;
        }

        .signals-title {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .signal-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .signal-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: #071018;
            border-radius: 3px;
            padding: 12px 14px;
            border-left: 3px solid;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .signal-item.pos {
            border-color: var(--safe);
        }

        .signal-item.neg {
            border-color: var(--dangerous);
        }

        .signal-item.warn {
            border-color: var(--suspicious);
        }

        .signal-icon {
            font-size: 1rem;
            line-height: 1;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .signal-body {
            flex: 1;
        }

        .signal-label {
            font-family: var(--sans);
            font-weight: 600;
            font-size: 0.9rem;
            color: #e0f4ff;
        }

        .signal-detail {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .signal-pts {
            font-family: var(--mono);
            font-size: 0.78rem;
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .signal-pts.pos {
            color: var(--safe);
        }

        .signal-pts.neg {
            color: var(--dangerous);
        }

        .no-signals {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--muted);
            text-align: center;
            padding: 16px;
        }

        /* ── Error ── */
        .error-msg {
            background: rgba(255, 23, 68, 0.08);
            border: 1px solid rgba(255, 23, 68, 0.3);
            border-radius: 3px;
            padding: 14px 18px;
            font-family: var(--mono);
            font-size: 0.82rem;
            color: var(--dangerous);
            display: none;
            margin-top: 12px;
        }

        .error-msg.show {
            display: block;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            margin-top: 56px;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        @media (max-width: 500px) {
            .input-row {
                flex-direction: column;
            }

            .verdict-banner {
                flex-direction: column;
                align-items: flex-start;
            }

            .stat-box {
                min-width: 90px;
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">

        <header>
            <div class="logo-badge">
                <svg class="shield-icon" viewBox="0 0 52 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M26 2L4 12V30C4 43 14 54 26 58C38 54 48 43 48 30V12L26 2Z" fill="none" stroke="#00e5ff"
                        stroke-width="2.5" />
                    <path d="M26 10L10 18V30C10 40 17 49 26 52C35 49 42 40 42 30V18L26 10Z" fill="rgba(0,229,255,0.06)"
                        stroke="#00e5ff" stroke-width="1" />
                    <path d="M17 30L23 36L35 24" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <h1>URL <span>Shield</span></h1>
            </div>
            <div class="tagline">// FAKE URL DETECTION ENGINE v1.0 //</div>
        </header>

        <div class="input-card">
            <span class="input-label">// Enter URL to analyze</span>
            <div class="input-row">
                <input type="text" id="urlInput" placeholder="https://example.com/login?redirect=..." autocomplete="off"
                    spellcheck="false" />
                <button class="scan-btn" id="scanBtn" onclick="analyze()">Scan</button>
            </div>
            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="spinner" id="spinner">
            <div class="dot-loader">
                <span></span><span></span><span></span>
            </div>
            ANALYZING URL...
        </div>

        <div class="result-card" id="resultCard">
            <div class="verdict-banner" id="verdictBanner">
                <div class="verdict-left">
                    <div class="verdict-label">// verdict</div>
                    <div class="verdict-text" id="verdictText">—</div>
                    <div class="verdict-url" id="verdictUrl"></div>
                </div>
                <div class="gauge-wrap">
                    <div class="gauge-circle" id="gaugeCircle">
                        <span class="gauge-score" id="gaugeScore">0</span>
                        <span class="gauge-sublabel">RISK</span>
                    </div>
                </div>
            </div>

            <div class="stats-row" id="statsRow"></div>

            <div class="signals-section">
                <div class="signals-title">// detection signals</div>
                <div class="signal-list" id="signalList"></div>
            </div>
        </div>

        <footer>BUILT WITH FASTAPI + PYTHON &nbsp;|&nbsp; URL SHIELD &copy; 2024</footer>
    </div>

    <script>
        const API = '';  // same origin

        async function analyze() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const spinner = document.getElementById('spinner');
            const resultCard = document.getElementById('resultCard');
            const scanBtn = document.getElementById('scanBtn');

            errorMsg.classList.remove('show');
            resultCard.classList.remove('show');

            if (!url) {
                showError('Please enter a URL to analyze.');
                return;
            }

            scanBtn.disabled = true;
            spinner.classList.add('active');

            try {
                const res = await fetch(`${API}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                if (data.error) { showError(data.error); return; }
                renderResult(data);
            } catch (e) {
                showError('Could not reach the server. Make sure the FastAPI backend is running on port 8000.');
            } finally {
                scanBtn.disabled = false;
                spinner.classList.remove('active');
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = '⚠  ' + msg;
            el.classList.add('show');
            document.getElementById('spinner').classList.remove('active');
            document.getElementById('scanBtn').disabled = false;
        }

        function renderResult(d) {
            // Verdict banner
            const banner = document.getElementById('verdictBanner');
            const colorMap = { safe: 'color-safe', suspicious: 'color-suspicious', likely_fake: 'color-likely_fake', dangerous: 'color-dangerous' };
            banner.className = 'verdict-banner ' + (colorMap[d.verdict_color] || '');
            banner.dataset.color = d.verdict_color;

            document.getElementById('verdictText').textContent = d.verdict;
            document.getElementById('verdictUrl').textContent = d.url.length > 70 ? d.url.slice(0, 70) + '…' : d.url;

            const score = document.getElementById('gaugeScore');
            score.textContent = d.risk_score;

            // Animate score count-up
            let cur = 0;
            const target = d.risk_score;
            const step = Math.ceil(target / 30);
            const timer = setInterval(() => {
                cur = Math.min(cur + step, target);
                score.textContent = cur;
                if (cur >= target) clearInterval(timer);
            }, 30);

            // Stats
            const s = d.stats;
            const statsRow = document.getElementById('statsRow');
            statsRow.innerHTML = [
                ['URL Length', s.url_length + ' chars'],
                ['Subdomains', s.subdomain_count],
                ['Entropy', s.entropy],
                ['TLD', s.tld || 'N/A'],
            ].map(([name, val]) =>
                `<div class="stat-box"><span class="stat-val">${val}</span><span class="stat-name">${name}</span></div>`
            ).join('');

            // Signals
            const signalList = document.getElementById('signalList');
            if (!d.signals.length) {
                signalList.innerHTML = '<div class="no-signals">No signals detected.</div>';
            } else {
                const sorted = [...d.signals].sort((a, b) => Math.abs(b.points) - Math.abs(a.points));
                signalList.innerHTML = sorted.map(sig => {
                    const isPos = sig.positive;
                    const cls = isPos ? 'pos' : (sig.points >= 15 ? 'neg' : 'warn');
                    const icon = isPos ? '✔' : (sig.points >= 15 ? '✖' : '⚠');
                    const ptsLabel = (isPos ? '' : '+') + sig.points + ' pts';
                    return `
        <div class="signal-item ${cls}">
          <div class="signal-icon">${icon}</div>
          <div class="signal-body">
            <div class="signal-label">${sig.label}</div>
            <div class="signal-detail">${sig.detail}</div>
          </div>
          <div class="signal-pts ${isPos ? 'pos' : 'neg'}">${ptsLabel}</div>
        </div>`;
                }).join('');
            }

            document.getElementById('resultCard').classList.add('show');
        }

        // Allow Enter key
        document.getElementById('urlInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') analyze();
        });
    </script>
</body>

</html>
